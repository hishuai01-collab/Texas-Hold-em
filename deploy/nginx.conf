# 德州扑克生产反代配置（企业级加固版）
# 部署前替换 poker.example.com 与证书路径。
# 前端 VITE_POKER_WS_URL 必须精确为 wss://<域名>/ws（与下方 location = /ws 一致）。
# 后端生产环境仅监听 127.0.0.1:8080，不接受外部直连。

# ---- 全局限流 zone（在 http 块；此处声明若主 nginx.conf 已定义可删） ----
# limit_req_zone $binary_remote_addr zone=ws_conn:10m rate=20r/s;

server {
    listen 80;
    listen [::]:80;
    server_name poker.example.com;

    # 仅放行 ACME HTTP 挑战，其余 301 跳转 HTTPS
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/poker-client/dist;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name poker.example.com;

    # ---- 可信 IP（防止 IP 拉黑误伤 Nginx 反代本身）----
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;

    # ---- TLS ----
    ssl_certificate     /etc/letsencrypt/live/poker.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/poker.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/poker.example.com/chain.pem;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ---- 安全响应头（企业级加固） ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # Content-Security-Policy
    # 注意：当前前端为 Vite 构建的 SPA，由 Nginx 静态托管，无服务端模板渲染，
    # 因此无法使用 CSP nonce 机制（nonce 需服务端在 HTML 响应中动态生成并注入）。
    # 如需 nonce 保护，可选方案：
    #   方案 A：将 index.html 交由 poker-server 的 HTTP API 层渲染，在响应中注入 nonce，
    #          同时 Nginx 反代层去掉 'unsafe-inline'，改为 script-src 'self' 'nonce-<random>'。
    #   方案 B：在 Nginx 中使用 ngx_http_sub_module 或 lua 模块动态替换占位符。
    # 当前策略使用 'unsafe-inline' 作为折中，配合 HSTS 与其它安全头形成多层防护。
    # 部署前替换 wss://poker.example.com 为实际域名。
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'strict-dynamic'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss://poker.example.com; font-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self';" always;

    root /var/www/poker-client/dist;
    index index.html;

    # ---- 压缩 ----
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # 拒绝超大请求体（反代仅转 WS 与静态，无上传需求）
    client_max_body_size 1m;

    # ---- SPA 入口：HTML 不缓存，保证发版即时生效 ----
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /index.html =404;
    }

    # ---- 静态资源：带哈希指纹，长缓存 + 不可变 ----
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ---- 探活路由：负载均衡器 / 监控使用 ----
    location = /healthz {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ---- SPA fallback：非文件/目录回退 index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- REST API 反代：私人牌桌创建 + 大厅列表 ----
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ---- WSS 反代：精确匹配 /ws，心跳缓冲 60s ----
    location = /ws {
        # limit_req zone=ws_conn burst=30 nodelay;  # 启用上方 zone 后取消注释
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # WebSocket Upgrade 核心头
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 透传真实客户端信息（风控防作弊）
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 心跳缓冲：配合后端 15s ping，60s 无活动即断开死链
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_buffering off;           # WS 必须关缓冲，避免消息积压
        proxy_request_buffering off;
    }
}
